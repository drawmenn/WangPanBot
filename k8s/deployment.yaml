apiVersion: apps/v1
kind: Deployment
metadata:
  name: wangpanbot
  namespace: wangpanbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wangpanbot
  template:
    metadata:
      labels:
        app: wangpanbot
    spec:
      containers:
        - name: wangpanbot
          image: your-dockerhub-or-ghcr-username/wangpanbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 10000
          envFrom:
            - configMapRef:
                name: wangpanbot-config
            - secretRef:
                name: wangpanbot-secret
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wangpanbot-data
